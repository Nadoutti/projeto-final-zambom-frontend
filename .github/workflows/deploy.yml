name: Deploy automatico ingressos frontend

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: "nadoutti"
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: nadoutti/ingressos-frontend:${{ github.sha }}
          build-args: |
            VITE_EVENTS_API=${{ secrets.VITE_EVENTS_API }}
            VITE_TICKETS_API=${{ secrets.VITE_TICKETS_API }}
            VITE_USERS_API=${{ secrets.VITE_USERS_API }}

      - name: executing remote ssh commands using password
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST_TEST }}
          username: "ubuntu"
          key: ${{ secrets.KEY_TEST }}
          port: 22
          script: |
            sudo docker stop ingressos-frontend || true
            sudo docker rm --force ingressos-frontend || true
            sudo docker run -d -p 8082:80 --network=rede --name ingressos-frontend nadoutti/ingressos-frontend:${{ github.sha }}
